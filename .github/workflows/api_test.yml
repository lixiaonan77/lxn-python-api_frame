name: API Auto Test with Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # 支持手动触发流水线
  workflow_dispatch:

# 配置流水线权限（最小权限原则）
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：避免多个流水线同时部署 Pages
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 测试任务：执行用例 + 生成报告
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码到云端环境
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Python 环境（3.9 稳定版）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. 安装项目依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 安装 Allure 命令行工具（生成 HTML 报告用）
      - name: Install Allure commandline
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz | tar -zx -C /opt
          echo "/opt/allure-2.24.0/bin" >> $GITHUB_PATH

      # 5. 执行测试用例（带重试机制）+ 生成原始 Allure 结果
      - name: Run tests with retry and generate Allure results
        run: |
          pytest testcase/ --alluredir=allure-results -v --reruns 2 --reruns-delay 2

      # 6. 【核心】直接用原始结果生成 Allure 报告（跳过合并）
      - name: Generate final Allure report
        run: |
          allure generate allure-results -o allure-report --clean

      # 7. 初始化 GitHub Pages 环境
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 8. 上传 Allure 报告到 Pages 工件
      - name: Upload Allure report as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      # 9. 钉钉原生通知（无第三方依赖，永不失效）
      - name: Send DingTalk notification (native curl)
        if: always()  # 无论成功/失败都发送通知
        run: |
          curl '${{ secrets.DINGTALK_WEBHOOK }}' \
          -H 'Content-Type: application/json' \
          -d '{
            "msgtype": "markdown",
            "markdown": {
              "title": "API 自动化测试结果",
              "text": "## 📢 API 自动化测试结果通知\n- 仓库：${{ github.repository }}\n- 分支：${{ github.ref_name }}\n- 状态：${{ job.status }}\n- 执行人：${{ github.actor }}\n- 运行详情：[点击查看](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n- Allure报告：[点击查看](${{ steps.deployment.outputs.page_url }})"
            }
          }'

  # 部署任务：把 Allure 报告部署到 GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test  # 依赖 test 任务完成
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

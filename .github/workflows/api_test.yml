name: API Auto Test with Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure commandline
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz | tar -zx -C /opt
          echo "/opt/allure-2.24.0/bin" >> $GITHUB_PATH

      - name: Run tests with retry and generate Allure results
        run: |
          pytest testcase/ --alluredir=allure-results -v --reruns 2 --reruns-delay 2

      - name: Combine multiple Allure results (if any)
        run: |
          allure-combine allure-results/ --output allure-combined

      - name: Generate final Allure report
        run: |
          allure generate allure-combined -o allure-report --clean

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Allure report as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      # 修复：使用稳定的钉钉通知 Action
      - name: Send DingTalk notification
        if: always()
        uses: zcong1993/dingtalk-action@v2.0.0
        with:
          # 填你在 GitHub Secrets 里配置的钉钉 Webhook 密钥名
          dingToken: ${{ secrets.DINGTALK_WEBHOOK }}
          # 通知内容（支持 markdown）
          msgType: markdown
          content: |
            ## 📢 API 自动化测试结果通知
            - 仓库：${{ github.repository }}
            - 分支：${{ github.ref_name }}
            - 状态：${{ job.status }}
            - 执行人：${{ github.actor }}
            - 运行详情：[点击查看](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Allure报告：[点击查看](${{ steps.deployment.outputs.page_url }})

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

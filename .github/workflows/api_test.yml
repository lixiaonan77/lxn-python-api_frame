name: API Auto Test with Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure commandline
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz | tar -zx -C /opt
          echo "/opt/allure-2.24.0/bin" >> $GITHUB_PATH

      - name: Run tests with retry and generate Allure results
        run: |
          pytest testcase/ --alluredir=allure-results -v --reruns 2 --reruns-delay 2

      #- name: Combine multiple Allure results (if any)
        #run: |
          #allure-combine allure-results/ --dest allure-combined --auto-create-folders
# 直接用原始结果生成报告
      - name: Generate final Allure report
         run: |
    	   allure generate allure-results -o allure-report --clean
      - name: Generate final Allure report
        run: |
          allure generate allure-combined -o allure-report --clean

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Allure report as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      # 核心修复：用 curl 直接调用钉钉 Webhook（原生方案，无依赖）
      - name: Send DingTalk notification (native curl)
        if: always()
        run: |
          curl '${{ secrets.DINGTALK_WEBHOOK }}' \
          -H 'Content-Type: application/json' \
          -d '{
            "msgtype": "markdown",
            "markdown": {
              "title": "API 自动化测试结果",
              "text": "## 📢 API 自动化测试结果通知\n- 仓库：${{ github.repository }}\n- 分支：${{ github.ref_name }}\n- 状态：${{ job.status }}\n- 执行人：${{ github.actor }}\n- 运行详情：[点击查看](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n- Allure报告：[点击查看](${{ steps.deployment.outputs.page_url }})"
            }
          }'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
